name: Release

on:
  push:
    branches:
      - main
      - develop

# Principle of Least Privilege: Base permissions are read-only
permissions: read-all

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    if: "!contains(github.event.head_commit.message, 'chore(release)')"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.13"
      
      - name: Set up uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5.2.2
      
      - name: Install dependencies
        run: |
          uv pip install --system build twine
          uv pip install --system -e ".[dev]"
      
      - name: Run tests
        run: |
          pytest tests/ -v
      
      - name: Verify package name in pyproject.toml
        run: |
          grep -q "name = \"spotforecast2\"" pyproject.toml || (echo "ERROR: Package name mismatch in pyproject.toml" && exit 1)
          echo "✓ Package name verified: spotforecast2"
      
      - name: Build distribution packages
        run: |
          python -m build
          echo "Build artifacts created:"
          ls -lah dist/
      
      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: 22
      
      - name: Install semantic-release
        run: |
          npm ci
      
      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
        run: npx semantic-release

      - name: Publish to PyPI
        if: success()
        uses: pypa/gh-action-pypi-publish@f7600683efdcb7656dec5b29656edb7bc586e597  # release/v1
        with:
          packages-dir: dist/
          skip-existing: true
          # Note: No token needed with Trusted Publishers (OIDC)
      
      - name: Install Quarto CLI
        if: success()
        uses: quarto-dev/quarto-actions/setup@8a96df13519ee81fd526f2dfca5962811136661b  # v2.2.0
        with:
          version: "1.7.29"
      
      - name: Generate API reference stubs
        if: success()
        run: |
          uv run python docs/quartodoc_build.py
          uv run quartodoc interlinks

      - name: Build documentation
        if: success()
        run: |
          quarto render --no-cache
      
      - name: Setup Git Credentials for Publish
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git

      - name: Deploy documentation
        if: success()
        uses: quarto-dev/quarto-actions/publish@8a96df13519ee81fd526f2dfca5962811136661b  # v2.2.0
        with:
          target: gh-pages
          path: _site
          render: "false"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Verify PyPI Release
        if: success()
        run: |
          echo "Release completed successfully!"
          echo "Verifying package on PyPI..."
          for i in {1..30}; do
            if python -c "import urllib.request; urllib.request.urlopen('https://pypi.org/project/spotforecast2/')" 2>/dev/null; then
              echo "✓ Package found on PyPI"
              break
            fi
            if [ $i -lt 30 ]; then
              echo "Waiting for PyPI to sync (attempt $i/30)..."
              sleep 10
            fi
          done

  # After a final release on main, merge main back into develop so that
  # CHANGELOG.md and pyproject.toml are in sync. Without this step,
  # both branches diverge on these files (main has "1.2.3", develop still
  # has "1.2.3-rc.N" from the last pre-release commit) and every subsequent
  # PR from develop -> main produces a conflict.
  back-merge:
    name: Sync main into develop
    runs-on: ubuntu-latest
    needs: release
    # Only run after a successful final release on main, not on develop rc releases.
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
          # Use the PAT so the push is authenticated.
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge main into develop
        run: |
          git fetch origin
          git checkout develop
          # -X theirs: when CHANGELOG.md / pyproject.toml conflict (both were
          # updated from the same rc base), keep main's final release version.
          git merge origin/main -X theirs --no-ff \
            -m "chore: sync main into develop [skip ci]"
          git push origin develop
